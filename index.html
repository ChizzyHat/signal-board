<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signal Board</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #0A0E17 0%, #111827 50%, #0D1321 100%);
      color: #F1F1F1;
      font-family: 'DM Sans', sans-serif;
      padding: 24px 28px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .mono { font-family: 'JetBrains Mono', monospace; }

    /* ── Header ── */
    .header { margin-bottom: 28px; }
    .header-top { display: flex; align-items: baseline; gap: 12px; justify-content: space-between; }
    .header-left { display: flex; align-items: baseline; gap: 12px; }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      display: inline;
    }

    .header .count {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
    }

    /* ── Sync Status Indicator ── */
    .sync-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.08);
      background: transparent;
      transition: all 0.2s;
    }

    .sync-status:hover {
      border-color: rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.6);
    }

    .sync-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
    }

    /* ── Settings Panel ── */
    .settings-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(4px);
    }

    .settings-panel {
      background: #1A1F2E;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 28px;
      width: 90%;
      max-width: 480px;
    }

    .settings-panel h2 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: -0.01em;
    }

    .settings-panel label {
      display: block;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 6px;
      margin-top: 16px;
    }

    .settings-panel label:first-of-type { margin-top: 0; }

    .settings-panel input[type="text"],
    .settings-panel input[type="password"] {
      width: 100%;
      padding: 8px 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: #F1F1F1;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      outline: none;
    }

    .settings-panel input:focus { border-color: rgba(255,255,255,0.3); }

    .settings-hint {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      margin-top: 4px;
      line-height: 1.5;
    }

    .settings-hint a { color: #3B82F6; text-decoration: none; }
    .settings-hint a:hover { text-decoration: underline; }

    .settings-buttons {
      display: flex;
      gap: 8px;
      margin-top: 24px;
      justify-content: flex-end;
    }

    .btn-secondary {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
    }

    .btn-primary {
      padding: 8px 20px;
      border-radius: 6px;
      border: none;
      background: #3B82F6;
      color: #FFF;
      font-size: 12px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
    }

    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .settings-error {
      color: #EF4444;
      font-size: 12px;
      margin-top: 12px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Filter Pills (status + solutions) ── */
    .filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .filter-pill {
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .filter-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
    }

    /* ── Solution Tag Badges ── */
    .solution-tags { display: flex; gap: 4px; flex-wrap: wrap; }

    .sol-tag {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid;
      user-select: none;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .sort-btns { display: flex; gap: 4px; }

    .sort-btn {
      padding: 4px 10px;
      border-radius: 4px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.35);
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
    }

    .sort-btn.active {
      background: rgba(255,255,255,0.1);
      color: #F1F1F1;
    }

    .action-btns { display: flex; gap: 8px; }

    .btn-reset {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      background: transparent;
      color: rgba(255,255,255,0.3);
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
    }

    .btn-add {
      padding: 6px 16px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      color: #F1F1F1;
      font-size: 12px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      letter-spacing: 0.02em;
    }

    /* ── Column Headers ── */
    .col-headers {
      display: grid;
      /* rank | logo | name | solutions | stage | lights | next-step | delete */
      grid-template-columns: 40px 32px 160px 70px 100px auto 1fr 36px;
      gap: 12px;
      padding: 0 16px 8px;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Account Rows ── */
    .accounts { display: flex; flex-direction: column; gap: 4px; }

    .account-row {
      display: grid;
      /* Must match .col-headers grid-template-columns above */
      grid-template-columns: 40px 32px 160px 70px 100px auto 1fr 36px;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      border-left: 4px solid rgba(255,255,255,0.06);
      transition: all 0.2s ease;
    }

    /* ── Logo Thumbnail ── */
    .logo-wrap {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      overflow: hidden;
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Placeholder icon when no logo is set */
    .logo-placeholder {
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      font-family: 'JetBrains Mono', monospace;
    }

    .logo-wrap:hover .logo-placeholder { color: rgba(255,255,255,0.5); }

    /* Hidden file input for logo upload */
    .logo-file-input { display: none; }

    .account-name {
      color: #F1F1F1;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.01em;
    }

    .name-input {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      color: #F1F1F1;
      padding: 4px 8px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      width: 100%;
    }

    .lights { display: flex; gap: 6px; align-items: center; }

    /* ── Priority Rank Badge ──
       Small editable number at the far left of each row.
       Clicking it swaps to a tiny number input so the user can retype the rank. */
    .rank-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 24px;
      width: 36px;
      border-radius: 6px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.55);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      transition: all 0.15s;
    }

    .rank-badge.empty {
      color: rgba(255,255,255,0.2);
    }

    .rank-badge:hover {
      border-color: rgba(255,255,255,0.25);
      color: #F1F1F1;
      background: rgba(255,255,255,0.08);
    }

    .rank-input {
      width: 36px;
      height: 24px;
      padding: 0 4px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      color: #F1F1F1;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      text-align: center;
      outline: none;
      /* Hide the browser's number spinners — the rank is entered by typing */
      -moz-appearance: textfield;
    }
    .rank-input::-webkit-outer-spin-button,
    .rank-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    /* ── Sales Stage Dropdown ──
       Native <select> styled to match the dark theme. */
    .stage-select {
      width: 100%;
      height: 26px;
      padding: 0 6px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      outline: none;
      cursor: pointer;
      /* Let the left border color communicate which stage is selected */
      border-left-width: 3px;
    }

    .stage-select:hover { border-color: rgba(255,255,255,0.25); }
    .stage-select:focus { border-color: rgba(255,255,255,0.4); }

    /* Dropdown options need an explicit dark background on most browsers */
    .stage-select option { background: #1A1F2E; color: #F1F1F1; }

    .light {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.12);
      background: transparent;
      cursor: pointer;
      transition: all 0.2s ease;
      padding: 0;
    }

    .next-step {
      background: transparent;
      border: 1px solid transparent;
      border-radius: 4px;
      color: rgba(255,255,255,0.6);
      padding: 4px 8px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }

    .next-step:hover { border-color: rgba(255,255,255,0.08); }
    .next-step:focus { border-color: rgba(255,255,255,0.15); }

    .delete-btn {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.2);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.2s;
    }

    .delete-btn:hover { color: #EF4444; }

    .empty {
      text-align: center;
      padding: 40px;
      color: rgba(255,255,255,0.25);
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Legend ── */
    .legend {
      margin-top: 32px;
      padding: 16px 0;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      font-family: 'JetBrains Mono', monospace;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    /* ── Logo Popup (domain entry for auto-fetch) ── */
    .logo-popup {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(4px);
    }

    .logo-popup-inner {
      background: #1A1F2E;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 380px;
    }

    .logo-popup-inner h3 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .logo-popup-inner input {
      width: 100%;
      padding: 8px 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: #F1F1F1;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      outline: none;
      margin-bottom: 8px;
    }

    .logo-popup-preview {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 12px 0;
      min-height: 40px;
    }

    .logo-popup-preview img {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      background: rgba(255,255,255,0.06);
      object-fit: contain;
    }

    .logo-popup-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px;
    }

    /* ── Filter separator ── */
    .filter-sep {
      width: 1px;
      height: 20px;
      background: rgba(255,255,255,0.1);
      margin: 0 4px;
      align-self: center;
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      body { padding: 16px; }
      .col-headers { display: none; }
      .account-row {
        /* rank + logo on top row, name takes the rest; everything else stacks below */
        grid-template-columns: 40px 32px 1fr;
        gap: 8px;
        padding: 14px 16px;
      }
      .stage-select { grid-column: 1 / -1; }
      .lights { grid-column: 1 / -1; }
      .solution-tags { grid-column: 1 / -1; }
      .next-step { grid-column: 1 / -1; }
      .delete-btn { grid-column: 1 / -1; justify-self: end; }
    }
  </style>
</head>
<body>

<div id="app"></div>

<script>
  // ──────────────────────────────────────────────
  // STATUS DEFINITIONS
  // ──────────────────────────────────────────────
  const STATUSES = [
    { id: "critical", label: "Critical", color: "#FF0040", description: "Urgent — drop everything" },
    { id: "on_me", label: "On Me", color: "#F59E0B", description: "I need to act" },
    { id: "on_colleague", label: "On Colleague", color: "#8B5CF6", description: "Waiting internally" },
    { id: "on_customer", label: "On Customer", color: "#3B82F6", description: "Waiting on them" },
    { id: "stalled", label: "Stalled", color: "#FFFFFF", description: "Stuck / escalate" },
    { id: "cruising", label: "Cruising", color: "#10B981", description: "Active, no action needed" },
  ];

  const STATUS_PRIORITY = ["critical", "on_me", "on_colleague", "on_customer", "stalled", "cruising"];

  // ──────────────────────────────────────────────
  // SOLUTION DEFINITIONS
  // Each solution gets a distinct color for its tag badge.
  // ──────────────────────────────────────────────
  const SOLUTIONS = [
    { id: "qms",    label: "QMS",    color: "#06B6D4" },  // cyan
    { id: "evolve", label: "Evolve", color: "#A78BFA" },  // violet
    { id: "iforms", label: "iForms", color: "#FB923C" },  // orange
  ];

  // ──────────────────────────────────────────────
  // SALES STAGE DEFINITIONS
  // Stages 1–8 with short labels shown in dropdown and filter pills.
  // Adjust labels to match your actual pipeline vocabulary.
  // ──────────────────────────────────────────────
  const SALES_STAGES = [
    { id: 1, label: "1 — Qualification",     color: "#e8eaed" },
    { id: 2, label: "2 — Validation",      color: "#0EA5E9" },
    { id: 3, label: "3 — Design",    color: "#14B8A6" },
    { id: 4, label: "4 — Negotiate",         color: "#84CC16" },
    { id: 5, label: "5 — Procurement",     color: "#EAB308" },
    { id: 6, label: "6 — Closed - Won",  color: "#F97316" },
    { id: 7, label: "7 — Closed - Lost",       color: "#EC4899" },
    { id: 8, label: "8 — Disqualified",   color: "#10B981" },
  ];

  // ──────────────────────────────────────────────
  // SEED DATA
  // priority = manual rank within the status group (lower number = higher priority).
  // stage = sales pipeline stage (1–8), or null if not set.
  // ──────────────────────────────────────────────
  const SEED = [
    { id: "1", name: "Acme Corp",    status: "on_me",        nextStep: "Send revised proposal by Friday", solutions: ["qms"],            stage: 5, priority: 1, logo: "", createdAt: Date.now() },
    { id: "2", name: "GlobalTech",   status: "on_customer",  nextStep: "Waiting on signed SOW",           solutions: ["evolve","iforms"], stage: 7, priority: 1, logo: "", createdAt: Date.now() },
    { id: "3", name: "Pinnacle Inc", status: "cruising",     nextStep: "",                                solutions: ["qms","evolve"],    stage: 3, priority: 1, logo: "", createdAt: Date.now() },
  ];

  // ──────────────────────────────────────────────
  // GITHUB SYNC ENGINE
  // ──────────────────────────────────────────────
  const LS_TOKEN = "sb-github-token";
  const LS_REPO  = "sb-github-repo";
  const LS_USER  = "sb-github-user";
  const DATA_FILE = "data.json";

  let fileSha = null;
  let saveTimer = null;

  function getGitHubConfig() {
    return {
      token: localStorage.getItem(LS_TOKEN) || "",
      repo:  localStorage.getItem(LS_REPO)  || "signal-board",
      user:  localStorage.getItem(LS_USER)  || "",
    };
  }

  function saveGitHubConfig(token, user, repo) {
    localStorage.setItem(LS_TOKEN, token);
    localStorage.setItem(LS_USER, user);
    localStorage.setItem(LS_REPO, repo);
  }

  function isConfigured() {
    const c = getGitHubConfig();
    return c.token && c.user && c.repo;
  }

  async function githubLoad() {
    const { token, user, repo } = getGitHubConfig();
    try {
      const res = await fetch(
        `https://api.github.com/repos/${user}/${repo}/contents/${DATA_FILE}`,
        { headers: { Authorization: `Bearer ${token}`, Accept: "application/vnd.github.v3+json" } }
      );
      if (res.status === 404) { fileSha = null; return null; }
      if (!res.ok) throw new Error(`GitHub API ${res.status}`);
      const json = await res.json();
      fileSha = json.sha;
      const decoded = atob(json.content.replace(/\n/g, ""));
      return JSON.parse(decoded);
    } catch (e) {
      console.error("GitHub load error:", e);
      return null;
    }
  }

  async function githubSave(accounts) {
    const { token, user, repo } = getGitHubConfig();
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(accounts, null, 2))));
    const body = { message: "Update signal board data", content };
    if (fileSha) body.sha = fileSha;

    try {
      const res = await fetch(
        `https://api.github.com/repos/${user}/${repo}/contents/${DATA_FILE}`,
        {
          method: "PUT",
          headers: {
            Authorization: `Bearer ${token}`,
            Accept: "application/vnd.github.v3+json",
            "Content-Type": "application/json",
          },
          body: JSON.stringify(body),
        }
      );
      if (!res.ok) throw new Error((await res.json()).message || `GitHub API ${res.status}`);
      const json = await res.json();
      fileSha = json.content.sha;
      return true;
    } catch (e) {
      console.error("GitHub save error:", e);
      return false;
    }
  }

  // Update only the sync indicator dot and label without rebuilding the whole DOM.
  // This prevents the name input from being destroyed while the user is typing.
  function updateSyncIndicator() {
    const syncInfo = {
      synced:  { dot: "#10B981", text: "Synced" },
      saving:  { dot: "#F59E0B", text: "Syncing..." },
      error:   { dot: "#EF4444", text: "Sync error" },
      offline: { dot: "rgba(255,255,255,0.25)", text: "Local only" },
      unknown: { dot: "rgba(255,255,255,0.25)", text: "..." },
    }[state.syncStatus];

    const btn = document.getElementById("syncBtn");
    if (!btn || !syncInfo) return; // bail if the button isn't rendered yet

    // Patch just the dot color and label text in place
    const dot = btn.querySelector(".sync-dot");
    if (dot) dot.style.background = syncInfo.dot;
    const label = btn.querySelector(".sync-label");
    if (label) label.textContent = syncInfo.text;
  }

  function debouncedGithubSave(accounts) {
    clearTimeout(saveTimer);
    state.syncStatus = "saving";
    // Only touch the sync indicator — do NOT call render() here,
    // as that would rebuild app.innerHTML and destroy any active input.
    updateSyncIndicator();
    saveTimer = setTimeout(async () => {
      const ok = await githubSave(accounts);
      state.syncStatus = ok ? "synced" : "error";
      state.lastSync = ok ? new Date() : state.lastSync;
      // Same here — update the indicator only, not the full DOM.
      updateSyncIndicator();
    }, 1500);
  }

  // ──────────────────────────────────────────────
  // LOCAL STORAGE FALLBACK
  // ──────────────────────────────────────────────
  const LS_ACCOUNTS = "signal-board-accounts";

  function localLoad() {
    try {
      const raw = localStorage.getItem(LS_ACCOUNTS);
      // Migrate old data: ensure every account has the expected fields.
      // Missing `stage` → null; missing `priority` → null (will be assigned on first render).
      if (raw) {
        const parsed = JSON.parse(raw);
        return parsed.map(a => ({
          ...a,
          solutions: a.solutions || [],
          logo: a.logo || "",
          stage: a.stage ?? null,
          priority: a.priority ?? null,
        }));
      }
      return null;
    } catch { return null; }
  }

  function localSave(accounts) {
    localStorage.setItem(LS_ACCOUNTS, JSON.stringify(accounts));
  }

  // ──────────────────────────────────────────────
  // APP STATE
  // ──────────────────────────────────────────────
  let state = {
    accounts: localLoad() || SEED,
    filter: "all",             // status filter
    solutionFilter: "all",     // solution filter
    stageFilter: "all",        // sales stage filter (1–8 or "all")
    sortBy: "status",
    editingId: null,
    editingRankId: null,       // which account's rank badge is currently in input mode
    showSettings: false,
    syncStatus: "unknown",
    lastSync: null,
    settingsError: "",
    loading: true,
    // Logo popup state
    logoPopup: null,           // account ID being edited, or null
    logoPreviewUrl: "",
    logoDomain: "",
  };

  // ──────────────────────────────────────────────
  // PERSISTENCE
  // ──────────────────────────────────────────────
  function persistAccounts() {
    localSave(state.accounts);
    if (isConfigured()) debouncedGithubSave(state.accounts);
  }

  function update(changes) {
    Object.assign(state, changes);
    persistAccounts();
    render();
  }

  async function initialLoad() {
    if (isConfigured()) {
      state.syncStatus = "saving";
      render();
      const remote = await githubLoad();
      if (remote) {
        // Migrate remote data to include new fields (stage, priority, solutions, logo)
        state.accounts = remote.map(a => ({
          ...a,
          solutions: a.solutions || [],
          logo: a.logo || "",
          stage: a.stage ?? null,
          priority: a.priority ?? null,
        }));
        localSave(state.accounts);
        state.syncStatus = "synced";
        state.lastSync = new Date();
      } else if (localLoad()) {
        state.accounts = localLoad();
        await githubSave(state.accounts);
        state.syncStatus = "synced";
      } else {
        state.accounts = SEED;
        state.syncStatus = "synced";
      }
    } else {
      state.accounts = localLoad() || SEED;
      state.syncStatus = "offline";
    }
    state.loading = false;
    render();
  }

  // ──────────────────────────────────────────────
  // HELPERS
  // ──────────────────────────────────────────────
  function getCounts() {
    return STATUSES.reduce((acc, s) => {
      acc[s.id] = state.accounts.filter(a => a.status === s.id).length;
      return acc;
    }, {});
  }

  function getSolCounts() {
    return SOLUTIONS.reduce((acc, s) => {
      acc[s.id] = state.accounts.filter(a => (a.solutions || []).includes(s.id)).length;
      return acc;
    }, {});
  }

  // Count of accounts at each sales stage (for filter pill badges)
  function getStageCounts() {
    return SALES_STAGES.reduce((acc, s) => {
      acc[s.id] = state.accounts.filter(a => a.stage === s.id).length;
      return acc;
    }, {});
  }

  function getFiltered() {
    let list = state.accounts;
    // Apply status filter
    if (state.filter !== "all") {
      list = list.filter(a => a.status === state.filter);
    }
    // Apply solution filter
    if (state.solutionFilter !== "all") {
      list = list.filter(a => (a.solutions || []).includes(state.solutionFilter));
    }
    // Apply stage filter (stageFilter is a number when active, or "all")
    if (state.stageFilter !== "all") {
      list = list.filter(a => a.stage === state.stageFilter);
    }
    return list;
  }

  function getSorted(filtered) {
    return [...filtered].sort((a, b) => {
      if (state.sortBy === "status") {
        // Primary sort: status priority (critical first, cruising last).
        const ai = STATUS_PRIORITY.indexOf(a.status);
        const bi = STATUS_PRIORITY.indexOf(b.status);
        const statusDiff = (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
        if (statusDiff !== 0) return statusDiff;
        // Secondary sort: manual priority rank within the same status group.
        // Lower rank number = higher priority. Unranked (null) accounts sink to the bottom.
        const ap = a.priority ?? Infinity;
        const bp = b.priority ?? Infinity;
        return ap - bp;
      }
      if (state.sortBy === "alpha") return a.name.localeCompare(b.name);
      return b.createdAt - a.createdAt;
    });
  }

  // ──────────────────────────────────────────────
  // PRIORITY RANK MANAGEMENT
  // Ranks are scoped per status group: accounts in "on_me" have their own
  // 1..N sequence, accounts in "on_customer" have their own, etc.
  // Any time we mutate a rank, we normalize the affected group so the
  // sequence is always a contiguous 1..N with no gaps and no duplicates.
  // ──────────────────────────────────────────────

  // Normalize the priority sequence within a given status group.
  // After this runs, accounts in that group are numbered 1..N in the order
  // dictated by their current priority (nulls go to the end).
  function normalizeGroup(statusId) {
    if (!statusId) return; // skip accounts without a status — they don't participate in ranking
    const group = state.accounts.filter(a => a.status === statusId);
    // Sort by current priority; unranked (null) drop to the bottom.
    group.sort((a, b) => (a.priority ?? Infinity) - (b.priority ?? Infinity));
    // Reassign priorities as a clean 1..N sequence.
    group.forEach((acct, i) => { acct.priority = i + 1; });
  }

  // Set an account's priority to a specific target rank within its status group.
  // Other accounts in the same group shift to accommodate, like inserting
  // a row in a spreadsheet. Clamps the target to the valid 1..N range.
  function setPriority(id, targetRank) {
    const acct = state.accounts.find(a => a.id === id);
    if (!acct || !acct.status) return;

    // Coerce to integer; ignore invalid input.
    const target = parseInt(targetRank, 10);
    if (isNaN(target) || target < 1) return;

    // Make sure the group is clean before we start shuffling.
    normalizeGroup(acct.status);

    // Clamp the requested rank to the size of the group.
    const group = state.accounts.filter(a => a.status === acct.status);
    const clamped = Math.min(target, group.length);

    // Temporarily park the target account outside the sequence so it doesn't
    // collide with itself during renumbering.
    acct.priority = 0;

    // Walk the group in priority order (excluding the target account) and
    // rebuild the sequence, inserting the target at the clamped position.
    const others = group
      .filter(a => a.id !== acct.id)
      .sort((a, b) => a.priority - b.priority);

    let rank = 1;
    others.forEach(other => {
      if (rank === clamped) rank++;      // leave a gap for the target
      other.priority = rank++;
    });
    acct.priority = clamped;

    update({});
  }

  // Assign a fresh priority to an account when it joins a new status group.
  // New arrivals go to the bottom of the group.
  function assignRankToBottom(acct) {
    if (!acct.status) { acct.priority = null; return; }
    const group = state.accounts.filter(a => a.status === acct.status && a.id !== acct.id);
    acct.priority = group.length + 1;
  }

  // ──────────────────────────────────────────────
  // ACCOUNT ACTIONS
  // ──────────────────────────────────────────────
  function addAccount() {
    state.accounts.unshift({
      id: Date.now().toString(),
      name: "New Account",
      status: null,
      nextStep: "",
      solutions: [],
      stage: null,
      priority: null,   // assigned when the account gets a status
      logo: "",
      createdAt: Date.now(),
    });
    state.editingId = state.accounts[0].id;
    update({});
  }

  function deleteAccount(id) {
    // Remember the deleted account's status so we can renumber its old group.
    const acct = state.accounts.find(a => a.id === id);
    const oldStatus = acct?.status;
    state.accounts = state.accounts.filter(a => a.id !== id);
    // Close the gap left behind in the old status group.
    if (oldStatus) normalizeGroup(oldStatus);
    update({});
  }

  function setStatus(id, statusId) {
    const acct = state.accounts.find(a => a.id === id);
    if (!acct) return;
    const oldStatus = acct.status;
    // Clicking the currently active light again clears the status (toggle-off behavior).
    const newStatus = acct.status === statusId ? null : statusId;

    acct.status = newStatus;

    // Close up the old group so its ranks stay 1..N with no gap.
    if (oldStatus && oldStatus !== newStatus) {
      acct.priority = null;           // leaving the old group — drop old rank
      normalizeGroup(oldStatus);
    }
    // Give the account a fresh rank at the bottom of its new group.
    if (newStatus && newStatus !== oldStatus) {
      assignRankToBottom(acct);
    }
    // If status was cleared entirely, wipe the priority so it won't interfere later.
    if (!newStatus) acct.priority = null;

    update({});
  }

  // Set an account's sales stage. Null clears the stage.
  function setStage(id, stageId) {
    const acct = state.accounts.find(a => a.id === id);
    if (!acct) return;
    // Empty-string or "null" from the dropdown means "no stage set".
    acct.stage = (stageId === "" || stageId === null) ? null : parseInt(stageId, 10);
    update({});
  }

  // Toggle a solution tag on/off for an account
  function toggleSolution(id, solId) {
    const acct = state.accounts.find(a => a.id === id);
    if (!acct) return;
    if (!acct.solutions) acct.solutions = [];
    const idx = acct.solutions.indexOf(solId);
    if (idx >= 0) {
      acct.solutions.splice(idx, 1);  // remove
    } else {
      acct.solutions.push(solId);      // add
    }
    update({});
  }

  function setNextStep(id, value) {
    const acct = state.accounts.find(a => a.id === id);
    if (acct) { acct.nextStep = value; persistAccounts(); }
  }

  function setName(id, value) {
    const acct = state.accounts.find(a => a.id === id);
    if (acct && value.trim()) acct.name = value.trim();
    state.editingId = null;
    update({});
  }

  function resetBoard() {
    state.accounts = [...SEED];
    state.filter = "all";
    state.solutionFilter = "all";
    state.stageFilter = "all";
    update({});
  }

  // ──────────────────────────────────────────────
  // LOGO HANDLING
  // Uses logo.clearbit.com for auto-fetch by domain.
  // Falls back to manual file upload.
  // Stores the URL (not base64) to keep data small.
  // ──────────────────────────────────────────────

  function openLogoPopup(id) {
    const acct = state.accounts.find(a => a.id === id);
    state.logoPopup = id;
    state.logoDomain = "";
    state.logoPreviewUrl = acct?.logo || "";
    render();
  }

  function closeLogoPopup() {
    state.logoPopup = null;
    render();
  }

  // Build logo URL from a domain string
  function logoUrlFromDomain(domain) {
    // Clean up: remove protocol, www, trailing slashes
    domain = domain.replace(/^https?:\/\//, "").replace(/^www\./, "").replace(/\/.*$/, "").trim();
    if (!domain) return "";
    return `https://logo.clearbit.com/${domain}`;
  }

  function saveLogo(id, url) {
    const acct = state.accounts.find(a => a.id === id);
    if (acct) {
      acct.logo = url;
      update({});
    }
    closeLogoPopup();
  }

  function removeLogo(id) {
    saveLogo(id, "");
  }

  // Handle manual file upload: convert to base64 data URL
  function handleLogoUpload(id, file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      saveLogo(id, reader.result);
    };
    reader.readAsDataURL(file);
  }

  // ──────────────────────────────────────────────
  // SETTINGS
  // ──────────────────────────────────────────────
  async function testAndSaveConfig(token, user, repo) {
    try {
      const res = await fetch(
        `https://api.github.com/repos/${user}/${repo}`,
        { headers: { Authorization: `Bearer ${token}`, Accept: "application/vnd.github.v3+json" } }
      );
      if (res.status === 401) return "Invalid token. Check that you copied it correctly.";
      if (res.status === 404) return `Repo "${user}/${repo}" not found. Check the name and make sure the token has access.`;
      if (!res.ok) return `GitHub returned an error (${res.status}).`;

      saveGitHubConfig(token, user, repo);
      state.showSettings = false;
      state.settingsError = "";
      render();

      await githubSave(state.accounts);
      state.syncStatus = "synced";
      state.lastSync = new Date();
      render();
      return null;
    } catch (e) {
      return "Network error. Check your connection.";
    }
  }

  function disconnectGitHub() {
    localStorage.removeItem(LS_TOKEN);
    localStorage.removeItem(LS_USER);
    localStorage.removeItem(LS_REPO);
    fileSha = null;
    state.syncStatus = "offline";
    state.showSettings = false;
    render();
  }

        <!-- Account rows -->
        <div class="accounts">
          ${sorted.length === 0 ? `
            <div class="empty">${state.filter === 'all' && state.solutionFilter === 'all' ? 'No accounts yet. Click + ADD ACCOUNT to get started.' : 'No accounts match these filters.'}</div>

                    return `<span class="sol-tag" data-sol="${acct.id}:${s.id}" style="
                      background:${on ? s.color + '22' : 'transparent'};
                      color:${on ? s.color : 'rgba(255,255,255,0.15)'};
                      border-color:${on ? s.color + '66' : 'rgba(255,255,255,0.06)'};
                    ">${s.label}</span>`;
                  }).join("")}
                </div>

                <!-- Sales Stage dropdown -->
                <select class="stage-select" data-stage="${acct.id}" style="
                  border-left-color:${stageRec ? stageRec.color : 'rgba(255,255,255,0.1)'};
                  color:${stageRec ? stageRec.color : 'rgba(255,255,255,0.4)'};
                ">
                  <option value="" ${!acct.stage ? 'selected' : ''}>— Stage —</option>
                  ${SALES_STAGES.map(s => `
                    <option value="${s.id}" ${acct.stage === s.id ? 'selected' : ''}>${s.label}</option>
                  `).join("")}
                </select>

                <!-- Signal lights -->
                <div class="lights">
                  ${STATUSES.map(s => {
                    const on = acct.status === s.id;
                    return `<button class="light" data-light="${acct.id}:${s.id}"
                      title="${s.label}: ${s.description}"
                      style="
                        border-color:${on ? s.color : 'rgba(255,255,255,0.12)'};
                        background:${on ? `radial-gradient(circle at 40% 35%, rgba(255,255,255,0.4) 0%, transparent 60%), ${s.color}` : 'transparent'};
                        box-shadow:${on ? `0 0 12px ${s.color}88, 0 0 24px ${s.color}44, inset 0 -2px 4px rgba(0,0,0,0.3)` : 'none'};
                      "></button>`;
                  }).join("")}
                </div>

                <!-- Next step -->
                <input class="next-step" data-nextstep="${acct.id}" value="${(acct.nextStep || '').replace(/"/g, '&quot;')}" placeholder="Next step..." />

                <!-- Delete -->
                <button class="delete-btn" data-delete="${acct.id}" title="Remove account">&times;</button>
              </div>`;
          }).join("")}
        </div>

        <!-- Legend -->
        <div class="legend">
          ${STATUSES.map(s => `
            <div class="legend-item">
              <span class="legend-dot" style="background:${s.color};box-shadow:0 0 6px ${s.color}66"></span>
              ${s.label} — ${s.description}
            </div>
          `).join("")}
        </div>`;
    }

    app.innerHTML = html;

    // ── Event Listeners ──

    // Logo popup
    app.querySelectorAll("[data-logo]").forEach(el => {
      el.addEventListener("click", () => openLogoPopup(el.dataset.logo));
    });

    const logoOverlay = document.getElementById("logoOverlay");
    if (logoOverlay) logoOverlay.addEventListener("click", e => { if (e.target === logoOverlay) closeLogoPopup(); });

    const logoCancelBtn = document.getElementById("logoCancelBtn");
    if (logoCancelBtn) logoCancelBtn.addEventListener("click", closeLogoPopup);

    const logoDomainInput = document.getElementById("logoDomainInput");
    if (logoDomainInput) {
      // As the user types a domain, show a live preview of the fetched logo
      const updatePreview = () => {
        const url = logoUrlFromDomain(logoDomainInput.value);
        state.logoDomain = logoDomainInput.value;
        state.logoPreviewUrl = url;
        const area = document.getElementById("logoPreviewArea");
        if (area && url) {
          area.innerHTML = `<img src="${url}" onerror="this.style.display='none'" style="width:40px;height:40px;border-radius:6px;background:rgba(255,255,255,0.06);object-fit:contain" /><span style="font-size:11px;color:rgba(255,255,255,0.3)">Preview</span>`;
          // Enable save button once we have a URL
          const saveBtn = document.getElementById("logoSaveBtn");
          if (saveBtn) saveBtn.disabled = false;
        }
      };
      logoDomainInput.addEventListener("input", updatePreview);
      logoDomainInput.addEventListener("keydown", e => { if (e.key === "Enter") updatePreview(); });
      logoDomainInput.focus();
    }

    const logoSaveBtn = document.getElementById("logoSaveBtn");
    if (logoSaveBtn) logoSaveBtn.addEventListener("click", () => saveLogo(state.logoPopup, state.logoPreviewUrl));

    const logoRemoveBtn = document.getElementById("logoRemoveBtn");
    if (logoRemoveBtn) logoRemoveBtn.addEventListener("click", () => removeLogo(state.logoPopup));

    const logoFileInput = document.getElementById("logoFileInput");
    if (logoFileInput) {
      logoFileInput.addEventListener("change", e => {
        if (e.target.files[0]) handleLogoUpload(state.logoPopup, e.target.files[0]);
      });
    }

    // Sync / Settings
    const syncBtn = document.getElementById("syncBtn");
    if (syncBtn) syncBtn.addEventListener("click", () => { state.showSettings = true; state.settingsError = ""; render(); });

    const settingsCancel = document.getElementById("settingsCancel");
    if (settingsCancel) settingsCancel.addEventListener("click", () => { state.showSettings = false; render(); });

    const disconnectBtn = document.getElementById("disconnectBtn");
    if (disconnectBtn) disconnectBtn.addEventListener("click", disconnectGitHub);

    const overlay = document.getElementById("settingsOverlay");
    if (overlay) overlay.addEventListener("click", e => { if (e.target === overlay) { state.showSettings = false; render(); } });

    const settingsSave = document.getElementById("settingsSave");
    if (settingsSave) {
      settingsSave.addEventListener("click", async () => {
        const token = document.getElementById("inputToken").value.trim();
        const user  = document.getElementById("inputUser").value.trim();
        const repo  = document.getElementById("inputRepo").value.trim();
        if (!token || !user || !repo) { state.settingsError = "All fields are required."; render(); return; }
        settingsSave.disabled = true;
        settingsSave.textContent = "Testing...";
        const err = await testAndSaveConfig(token, user, repo);
        if (err) { state.settingsError = err; render(); }
      });
    }

    // Status filters
    app.querySelectorAll("[data-filter]").forEach(btn => {
      btn.addEventListener("click", () => {
        const f = btn.dataset.filter;
        update({ filter: state.filter === f && f !== "all" ? "all" : f });
      });
    });

    // Solution filters
    app.querySelectorAll("[data-sol-filter]").forEach(btn => {
      btn.addEventListener("click", () => {
        const f = btn.dataset.solFilter;
        update({ solutionFilter: state.solutionFilter === f ? "all" : f });
      });
    });

    // Sales Stage filters: click to filter by stage; click again to clear.
    // Note: dataset values are strings, so we parseInt before storing.
    app.querySelectorAll("[data-stage-filter]").forEach(btn => {
      btn.addEventListener("click", () => {
        const f = parseInt(btn.dataset.stageFilter, 10);
        update({ stageFilter: state.stageFilter === f ? "all" : f });
      });
    });

    // Sales Stage dropdowns on each row
    app.querySelectorAll("[data-stage]").forEach(sel => {
      sel.addEventListener("change", () => setStage(sel.dataset.stage, sel.value));
    });

    // Rank badge: click to switch to input mode
    app.querySelectorAll("[data-edit-rank]").forEach(el => {
      el.addEventListener("click", () => {
        const id = el.dataset.editRank;
        const acct = state.accounts.find(a => a.id === id);
        // Only allow rank editing when the account has a status (otherwise ranking is meaningless).
        if (!acct || !acct.status) return;
        state.editingRankId = id;
        render();
      });
    });

    // Rank input: on blur or Enter, commit the new rank and re-sort the group
    app.querySelectorAll("[data-rank-input]").forEach(input => {
      const commit = () => {
        const id = input.dataset.rankInput;
        const val = input.value.trim();
        state.editingRankId = null;
        if (val === "") {
          // Empty = cancel edit, no change
          render();
          return;
        }
        setPriority(id, val);  // setPriority calls update() which re-renders
      };
      input.addEventListener("blur", commit);
      input.addEventListener("keydown", e => {
        if (e.key === "Enter") input.blur();
        if (e.key === "Escape") { state.editingRankId = null; render(); }
      });
      // Auto-focus and select the value when the input appears
      input.focus();
      input.select();
    });

    // Sort
    app.querySelectorAll("[data-sort]").forEach(btn => {
      btn.addEventListener("click", () => update({ sortBy: btn.dataset.sort }));
    });

    // Add / Reset
    const addBtn = document.getElementById("addBtn");
    if (addBtn) addBtn.addEventListener("click", addAccount);
    const resetBtn = document.getElementById("resetBtn");
    if (resetBtn) resetBtn.addEventListener("click", resetBoard);

    // Edit name
    app.querySelectorAll("[data-edit-name]").forEach(el => {
      el.addEventListener("click", () => {
        state.editingId = el.dataset.editName;
        render();
        const input = app.querySelector(`[data-name-input="${el.dataset.editName}"]`);
        if (input) { input.focus(); input.select(); }
      });
    });

    // Name input commit
    app.querySelectorAll("[data-name-input]").forEach(input => {
      const id = input.dataset.nameInput;
      input.addEventListener("blur", () => setName(id, input.value));
      input.addEventListener("keydown", e => { if (e.key === "Enter") input.blur(); });
    });

    // Signal lights
    app.querySelectorAll("[data-light]").forEach(btn => {
      btn.addEventListener("click", () => {
        const [id, statusId] = btn.dataset.light.split(":");
        setStatus(id, statusId);
      });
    });

    // Solution tags — click to toggle
    app.querySelectorAll("[data-sol]").forEach(el => {
      el.addEventListener("click", () => {
        const [id, solId] = el.dataset.sol.split(":");
        toggleSolution(id, solId);
      });
    });

    // Next step
    app.querySelectorAll("[data-nextstep]").forEach(input => {
      input.addEventListener("blur", () => setNextStep(input.dataset.nextstep, input.value));
      input.addEventListener("keydown", e => { if (e.key === "Enter") input.blur(); });
    });

    // Delete
    app.querySelectorAll("[data-delete]").forEach(btn => {
      btn.addEventListener("click", () => deleteAccount(btn.dataset.delete));
    });

    // Auto-focus name input
    if (state.editingId) {
      const input = app.querySelector(`[data-name-input="${state.editingId}"]`);
      if (input) { input.focus(); input.select(); }
    }
  }

  // ── Boot ──
  render();
  initialLoad();
</script>
</body>
</html>
