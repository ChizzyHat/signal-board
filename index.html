<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signal Board</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #0A0E17 0%, #111827 50%, #0D1321 100%);
      color: #F1F1F1;
      font-family: 'DM Sans', sans-serif;
      padding: 24px 28px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .mono { font-family: 'JetBrains Mono', monospace; }

    /* ── Header ── */
    .header { margin-bottom: 28px; }
    .header-top { display: flex; align-items: baseline; gap: 12px; justify-content: space-between; }
    .header-left { display: flex; align-items: baseline; gap: 12px; }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      display: inline;
    }

    .header .count {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
    }

    /* ── Sync Status Indicator ── */
    .sync-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.08);
      background: transparent;
      transition: all 0.2s;
    }

    .sync-status:hover {
      border-color: rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.6);
    }

    .sync-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
    }

    /* ── Settings Panel ── */
    .settings-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(4px);
    }

    .settings-panel {
      background: #1A1F2E;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 28px;
      width: 90%;
      max-width: 480px;
    }

    .settings-panel h2 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: -0.01em;
    }

    .settings-panel label {
      display: block;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 6px;
      margin-top: 16px;
    }

    .settings-panel label:first-of-type { margin-top: 0; }

    .settings-panel input[type="text"],
    .settings-panel input[type="password"] {
      width: 100%;
      padding: 8px 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: #F1F1F1;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      outline: none;
    }

    .settings-panel input:focus { border-color: rgba(255,255,255,0.3); }

    .settings-hint {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      margin-top: 4px;
      line-height: 1.5;
    }

    .settings-hint a { color: #3B82F6; text-decoration: none; }
    .settings-hint a:hover { text-decoration: underline; }

    .settings-buttons {
      display: flex;
      gap: 8px;
      margin-top: 24px;
      justify-content: flex-end;
    }

    .btn-secondary {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
    }

    .btn-primary {
      padding: 8px 20px;
      border-radius: 6px;
      border: none;
      background: #3B82F6;
      color: #FFF;
      font-size: 12px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
    }

    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .settings-error {
      color: #EF4444;
      font-size: 12px;
      margin-top: 12px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Filter Pills ── */
    .filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .filter-pill {
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .filter-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .sort-btns { display: flex; gap: 4px; }

    .sort-btn {
      padding: 4px 10px;
      border-radius: 4px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.35);
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
    }

    .sort-btn.active {
      background: rgba(255,255,255,0.1);
      color: #F1F1F1;
    }

    .action-btns { display: flex; gap: 8px; }

    .btn-reset {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      background: transparent;
      color: rgba(255,255,255,0.3);
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
    }

    .btn-add {
      padding: 6px 16px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      color: #F1F1F1;
      font-size: 12px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      letter-spacing: 0.02em;
    }

    /* ── Column Headers ── */
    .col-headers {
      display: grid;
      grid-template-columns: 4px 180px auto 1fr 36px;
      gap: 16px;
      padding: 0 16px 8px;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Account Rows ── */
    .accounts { display: flex; flex-direction: column; gap: 4px; }

    .account-row {
      display: grid;
      grid-template-columns: 4px 180px auto 1fr 36px;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      border-left: 4px solid rgba(255,255,255,0.06);
      transition: all 0.2s ease;
    }

    .account-name {
      color: #F1F1F1;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.01em;
    }

    .name-input {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      color: #F1F1F1;
      padding: 4px 8px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      width: 100%;
    }

    .lights { display: flex; gap: 8px; align-items: center; }

    .light {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.12);
      background: transparent;
      cursor: pointer;
      transition: all 0.2s ease;
      padding: 0;
    }

    .next-step {
      background: transparent;
      border: 1px solid transparent;
      border-radius: 4px;
      color: rgba(255,255,255,0.6);
      padding: 4px 8px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }

    .next-step:hover { border-color: rgba(255,255,255,0.08); }
    .next-step:focus { border-color: rgba(255,255,255,0.15); }

    .delete-btn {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.2);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.2s;
    }

    .delete-btn:hover { color: #EF4444; }

    .empty {
      text-align: center;
      padding: 40px;
      color: rgba(255,255,255,0.25);
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Legend ── */
    .legend {
      margin-top: 32px;
      padding: 16px 0;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      font-family: 'JetBrains Mono', monospace;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    /* ── Mobile Responsive ── */
    @media (max-width: 768px) {
      body { padding: 16px; }
      .col-headers { display: none; }
      .account-row {
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 14px 16px;
      }
      .account-row > div:first-child { display: none; }
      .lights { justify-content: flex-start; }
    }
  </style>
</head>
<body>

<div id="app"></div>

<script>
  // ──────────────────────────────────────────────
  // STATUS DEFINITIONS
  // Each status answers: "Who has the ball?" + urgency.
  // ──────────────────────────────────────────────
  const STATUSES = [
    { id: "on_me", label: "On Me", color: "#F59E0B", description: "I need to act" },
    { id: "on_colleague", label: "On Colleague", color: "#8B5CF6", description: "Waiting internally" },
    { id: "on_customer", label: "On Customer", color: "#3B82F6", description: "Waiting on them" },
    { id: "blocked", label: "Blocked", color: "#F97316", description: "Stuck / escalate" },
    { id: "critical", label: "Critical", color: "#FF0040", description: "Urgent — drop everything" },
    { id: "cruising", label: "Cruising", color: "#10B981", description: "Active, no action needed" },
  ];

  // Priority order for sorting (most urgent first)
  const STATUS_PRIORITY = ["critical", "blocked", "on_me", "on_colleague", "on_customer", "cruising"];

  // ──────────────────────────────────────────────
  // SEED DATA — shown on first visit
  // ──────────────────────────────────────────────
  const SEED = [
    { id: "1", name: "Acme Corp", status: "on_me", nextStep: "Send revised proposal by Friday", createdAt: Date.now() },
    { id: "2", name: "GlobalTech", status: "on_customer", nextStep: "Waiting on signed SOW", createdAt: Date.now() },
    { id: "3", name: "Pinnacle Inc", status: "cruising", nextStep: "", createdAt: Date.now() },
  ];

  // ──────────────────────────────────────────────
  // GITHUB SYNC ENGINE
  // Reads/writes a data.json file in the user's repo
  // using the GitHub Contents API. The personal access
  // token is stored in localStorage (per device), but
  // the actual data lives in the repo (shared).
  // ──────────────────────────────────────────────

  const LS_TOKEN = "sb-github-token";
  const LS_REPO  = "sb-github-repo";
  const LS_USER  = "sb-github-user";
  const DATA_FILE = "data.json";

  // The SHA of the current data.json in the repo.
  // GitHub requires this to update an existing file.
  let fileSha = null;

  // Debounce timer so we don't commit on every keystroke
  let saveTimer = null;

  function getGitHubConfig() {
    return {
      token: localStorage.getItem(LS_TOKEN) || "",
      repo:  localStorage.getItem(LS_REPO)  || "signal-board",
      user:  localStorage.getItem(LS_USER)  || "",
    };
  }

  function saveGitHubConfig(token, user, repo) {
    localStorage.setItem(LS_TOKEN, token);
    localStorage.setItem(LS_USER, user);
    localStorage.setItem(LS_REPO, repo);
  }

  function isConfigured() {
    const c = getGitHubConfig();
    return c.token && c.user && c.repo;
  }

  // Fetch data.json from the GitHub repo
  async function githubLoad() {
    const { token, user, repo } = getGitHubConfig();
    try {
      const res = await fetch(
        `https://api.github.com/repos/${user}/${repo}/contents/${DATA_FILE}`,
        { headers: { Authorization: `Bearer ${token}`, Accept: "application/vnd.github.v3+json" } }
      );
      if (res.status === 404) {
        // File doesn't exist yet — we'll create it on first save
        fileSha = null;
        return null;
      }
      if (!res.ok) throw new Error(`GitHub API ${res.status}`);
      const json = await res.json();
      // Remember the SHA so we can update the file later
      fileSha = json.sha;
      // Decode the base64 content
      const decoded = atob(json.content.replace(/\n/g, ""));
      return JSON.parse(decoded);
    } catch (e) {
      console.error("GitHub load error:", e);
      return null;
    }
  }

  // Write account data to data.json in the repo
  async function githubSave(accounts) {
    const { token, user, repo } = getGitHubConfig();
    // Encode the data as base64 for the GitHub API
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(accounts, null, 2))));
    const body = { message: "Update signal board data", content };
    // Include the SHA if the file already exists (required for updates)
    if (fileSha) body.sha = fileSha;

    try {
      const res = await fetch(
        `https://api.github.com/repos/${user}/${repo}/contents/${DATA_FILE}`,
        {
          method: "PUT",
          headers: {
            Authorization: `Bearer ${token}`,
            Accept: "application/vnd.github.v3+json",
            "Content-Type": "application/json",
          },
          body: JSON.stringify(body),
        }
      );
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.message || `GitHub API ${res.status}`);
      }
      const json = await res.json();
      // Update SHA to the new version
      fileSha = json.content.sha;
      return true;
    } catch (e) {
      console.error("GitHub save error:", e);
      return false;
    }
  }

  // Wait 1.5s of inactivity before pushing to GitHub
  // so rapid edits don't create a commit per keystroke
  function debouncedGithubSave(accounts) {
    clearTimeout(saveTimer);
    state.syncStatus = "saving";
    render();
    saveTimer = setTimeout(async () => {
      const ok = await githubSave(accounts);
      state.syncStatus = ok ? "synced" : "error";
      state.lastSync = ok ? new Date() : state.lastSync;
      render();
    }, 1500);
  }

  // ──────────────────────────────────────────────
  // LOCAL STORAGE (fast cache + offline fallback)
  // ──────────────────────────────────────────────
  const LS_ACCOUNTS = "signal-board-accounts";

  function localLoad() {
    try {
      const raw = localStorage.getItem(LS_ACCOUNTS);
      return raw ? JSON.parse(raw) : null;
    } catch { return null; }
  }

  function localSave(accounts) {
    localStorage.setItem(LS_ACCOUNTS, JSON.stringify(accounts));
  }

  // ──────────────────────────────────────────────
  // APP STATE
  // ──────────────────────────────────────────────
  let state = {
    accounts: localLoad() || SEED,
    filter: "all",
    sortBy: "status",
    editingId: null,
    showSettings: false,
    syncStatus: "unknown",  // "unknown" | "synced" | "saving" | "error" | "offline"
    lastSync: null,
    settingsError: "",
    loading: true,
  };

  // ──────────────────────────────────────────────
  // PERSISTENCE: save locally + push to GitHub
  // ──────────────────────────────────────────────
  function persistAccounts() {
    localSave(state.accounts);
    if (isConfigured()) {
      debouncedGithubSave(state.accounts);
    }
  }

  function update(changes) {
    Object.assign(state, changes);
    persistAccounts();
    render();
  }

  // ──────────────────────────────────────────────
  // INITIAL LOAD: GitHub first, local fallback
  // ──────────────────────────────────────────────
  async function initialLoad() {
    if (isConfigured()) {
      state.syncStatus = "saving";
      render();
      const remote = await githubLoad();
      if (remote) {
        // Remote data found — use it and update local cache
        state.accounts = remote;
        localSave(remote);
        state.syncStatus = "synced";
        state.lastSync = new Date();
      } else if (localLoad()) {
        // No remote file yet — push local data up
        state.accounts = localLoad();
        await githubSave(state.accounts);
        state.syncStatus = "synced";
      } else {
        state.accounts = SEED;
        state.syncStatus = "synced";
      }
    } else {
      // No GitHub config — local-only mode
      state.accounts = localLoad() || SEED;
      state.syncStatus = "offline";
    }
    state.loading = false;
    render();
  }

  // ──────────────────────────────────────────────
  // HELPERS
  // ──────────────────────────────────────────────
  function getCounts() {
    return STATUSES.reduce((acc, s) => {
      acc[s.id] = state.accounts.filter(a => a.status === s.id).length;
      return acc;
    }, {});
  }

  function getFiltered() {
    if (state.filter === "all") return state.accounts;
    return state.accounts.filter(a => a.status === state.filter);
  }

  function getSorted(filtered) {
    return [...filtered].sort((a, b) => {
      if (state.sortBy === "status") {
        const ai = STATUS_PRIORITY.indexOf(a.status);
        const bi = STATUS_PRIORITY.indexOf(b.status);
        return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
      }
      if (state.sortBy === "alpha") return a.name.localeCompare(b.name);
      return b.createdAt - a.createdAt;
    });
  }

  // ──────────────────────────────────────────────
  // ACCOUNT ACTIONS
  // ──────────────────────────────────────────────
  function addAccount() {
    state.accounts.unshift({
      id: Date.now().toString(),
      name: "New Account",
      status: null,
      nextStep: "",
      createdAt: Date.now(),
    });
    state.editingId = state.accounts[0].id;
    update({});
  }

  function deleteAccount(id) {
    state.accounts = state.accounts.filter(a => a.id !== id);
    update({});
  }

  function setStatus(id, statusId) {
    const acct = state.accounts.find(a => a.id === id);
    if (acct) {
      acct.status = acct.status === statusId ? null : statusId;
      update({});
    }
  }

  function setNextStep(id, value) {
    const acct = state.accounts.find(a => a.id === id);
    if (acct) { acct.nextStep = value; persistAccounts(); }
  }

  function setName(id, value) {
    const acct = state.accounts.find(a => a.id === id);
    if (acct && value.trim()) acct.name = value.trim();
    state.editingId = null;
    update({});
  }

  function resetBoard() {
    state.accounts = [...SEED];
    state.filter = "all";
    update({});
  }

  // ──────────────────────────────────────────────
  // SETTINGS: connect / disconnect GitHub
  // ──────────────────────────────────────────────
  async function testAndSaveConfig(token, user, repo) {
    try {
      // Test the credentials by hitting the repo endpoint
      const res = await fetch(
        `https://api.github.com/repos/${user}/${repo}`,
        { headers: { Authorization: `Bearer ${token}`, Accept: "application/vnd.github.v3+json" } }
      );
      if (res.status === 401) return "Invalid token. Check that you copied it correctly.";
      if (res.status === 404) return `Repo "${user}/${repo}" not found. Check the name and make sure the token has access.`;
      if (!res.ok) return `GitHub returned an error (${res.status}). Try again.`;

      // Credentials valid — save and sync
      saveGitHubConfig(token, user, repo);
      state.showSettings = false;
      state.settingsError = "";
      render();

      // Push current data to the repo
      await githubSave(state.accounts);
      state.syncStatus = "synced";
      state.lastSync = new Date();
      render();
      return null;
    } catch (e) {
      return "Network error. Check your connection.";
    }
  }

  function disconnectGitHub() {
    localStorage.removeItem(LS_TOKEN);
    localStorage.removeItem(LS_USER);
    localStorage.removeItem(LS_REPO);
    fileSha = null;
    state.syncStatus = "offline";
    state.showSettings = false;
    render();
  }

  // ──────────────────────────────────────────────
  // RENDER — builds the full UI as HTML
  // ──────────────────────────────────────────────
  function render() {
    const counts = getCounts();
    const sorted = getSorted(getFiltered());
    const cfg = getGitHubConfig();

    // Map sync status to a dot color and label
    const syncInfo = {
      synced:  { dot: "#10B981", text: "Synced" },
      saving:  { dot: "#F59E0B", text: "Syncing..." },
      error:   { dot: "#EF4444", text: "Sync error" },
      offline: { dot: "rgba(255,255,255,0.25)", text: "Local only" },
      unknown: { dot: "rgba(255,255,255,0.25)", text: "..." },
    }[state.syncStatus];

    const app = document.getElementById("app");

    // ── Build HTML string ──
    let html = "";

    // Settings modal (if open)
    if (state.showSettings) {
      html += `
        <div class="settings-overlay" id="settingsOverlay">
          <div class="settings-panel">
            <h2>${isConfigured() ? "Sync Settings" : "Set Up Cross-Device Sync"}</h2>
            ${isConfigured() ? `
              <p style="font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:16px;line-height:1.6">
                Currently syncing to <strong style="color:#F1F1F1">${cfg.user}/${cfg.repo}</strong>
              </p>
              <div class="settings-buttons">
                <button class="btn-secondary" id="settingsCancel">Close</button>
                <button class="btn-secondary" id="disconnectBtn" style="border-color:#EF4444;color:#EF4444">Disconnect</button>
              </div>
            ` : `
              <p style="font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:8px;line-height:1.6">
                Connect your GitHub repo so your board syncs across all your devices.
              </p>
              <label>GitHub Username</label>
              <input type="text" id="inputUser" value="${cfg.user}" placeholder="chizzyhat" />
              <label>Repository Name</label>
              <input type="text" id="inputRepo" value="${cfg.repo}" placeholder="signal-board" />
              <label>Personal Access Token</label>
              <input type="password" id="inputToken" value="" placeholder="ghp_xxxxxxxxxxxx" />
              <div class="settings-hint">
                Create one at
                <a href="https://github.com/settings/tokens/new?scopes=repo&description=Signal+Board" target="_blank">
                  github.com/settings/tokens
                </a>
                — select the <strong>repo</strong> scope.
              </div>
              ${state.settingsError ? `<div class="settings-error">${state.settingsError}</div>` : ""}
              <div class="settings-buttons">
                <button class="btn-secondary" id="settingsCancel">Cancel</button>
                <button class="btn-primary" id="settingsSave">Connect</button>
              </div>
            `}
          </div>
        </div>`;
    }

    // Loading state
    if (state.loading) {
      html += `<div class="empty" style="padding:80px">Loading...</div>`;
    } else {
      // Main dashboard
      html += `
        <div class="header">
          <div class="header-top">
            <div class="header-left">
              <h1>SIGNAL BOARD</h1>
              <span class="mono count">${state.accounts.length} accounts</span>
            </div>
            <button class="sync-status" id="syncBtn">
              <span class="sync-dot" style="background:${syncInfo.dot};box-shadow:0 0 6px ${syncInfo.dot}66"></span>
              ${syncInfo.text}
            </button>
          </div>
          <div class="filters">
            <button class="filter-pill" data-filter="all"
              style="${state.filter === 'all' ? 'border-color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.1)' : ''}">
              ALL ${state.accounts.length}
            </button>
            ${STATUSES.map(s => `
              <button class="filter-pill" data-filter="${s.id}" style="
                border-color: ${state.filter === s.id ? s.color : 'rgba(255,255,255,0.08)'};
                background: ${state.filter === s.id ? s.color + '22' : 'transparent'};
                color: ${counts[s.id] > 0 ? s.color : 'rgba(255,255,255,0.25)'}">
                <span class="filter-dot" style="background:${counts[s.id] > 0 ? s.color : 'rgba(255,255,255,0.15)'}"></span>
                ${s.label.toUpperCase()} ${counts[s.id]}
              </button>
            `).join("")}
          </div>
        </div>

        <div class="toolbar">
          <div class="sort-btns">
            ${[{key:"status",label:"By Priority"},{key:"alpha",label:"A–Z"},{key:"newest",label:"Newest"}].map(o => `
              <button class="sort-btn ${state.sortBy === o.key ? 'active' : ''}" data-sort="${o.key}">${o.label}</button>
            `).join("")}
          </div>
          <div class="action-btns">
            <button class="btn-reset" id="resetBtn">RESET</button>
            <button class="btn-add" id="addBtn">+ ADD ACCOUNT</button>
          </div>
        </div>

        <div class="col-headers">
          <div></div><div>Account</div><div>Status</div><div>Next Step</div><div></div>
        </div>

        <div class="accounts">
          ${sorted.length === 0 ? `
            <div class="empty">${state.filter === 'all' ? 'No accounts yet. Click + ADD ACCOUNT to get started.' : 'No accounts with this status.'}</div>
          ` : sorted.map(acct => {
            const active = STATUSES.find(s => s.id === acct.status);
            const borderColor = active ? active.color : 'rgba(255,255,255,0.06)';
            const isEditing = state.editingId === acct.id;
            return `
              <div class="account-row" style="border-left-color:${borderColor}">
                <div></div>
                ${isEditing ? `
                  <input class="name-input" data-name-input="${acct.id}" value="${acct.name}" />
                ` : `
                  <div class="account-name" data-edit-name="${acct.id}" title="Click to edit name">${acct.name}</div>
                `}
                <div class="lights">
                  ${STATUSES.map(s => {
                    const on = acct.status === s.id;
                    return `<button class="light" data-light="${acct.id}:${s.id}"
                      title="${s.label}: ${s.description}"
                      style="
                        border-color:${on ? s.color : 'rgba(255,255,255,0.12)'};
                        background:${on ? `radial-gradient(circle at 40% 35%, rgba(255,255,255,0.4) 0%, transparent 60%), ${s.color}` : 'transparent'};
                        box-shadow:${on ? `0 0 12px ${s.color}88, 0 0 24px ${s.color}44, inset 0 -2px 4px rgba(0,0,0,0.3)` : 'none'};
                      "></button>`;
                  }).join("")}
                </div>
                <input class="next-step" data-nextstep="${acct.id}" value="${(acct.nextStep || '').replace(/"/g, '&quot;')}" placeholder="Next step..." />
                <button class="delete-btn" data-delete="${acct.id}" title="Remove account">&times;</button>
              </div>`;
          }).join("")}
        </div>

        <div class="legend">
          ${STATUSES.map(s => `
            <div class="legend-item">
              <span class="legend-dot" style="background:${s.color};box-shadow:0 0 6px ${s.color}66"></span>
              ${s.label} — ${s.description}
            </div>
          `).join("")}
        </div>`;
    }

    app.innerHTML = html;

    // ── Attach Event Listeners ──

    // Sync/settings button
    const syncBtn = document.getElementById("syncBtn");
    if (syncBtn) syncBtn.addEventListener("click", () => { state.showSettings = true; state.settingsError = ""; render(); });

    // Settings cancel
    const settingsCancel = document.getElementById("settingsCancel");
    if (settingsCancel) settingsCancel.addEventListener("click", () => { state.showSettings = false; render(); });

    // Disconnect
    const disconnectBtn = document.getElementById("disconnectBtn");
    if (disconnectBtn) disconnectBtn.addEventListener("click", disconnectGitHub);

    // Click overlay background to close
    const overlay = document.getElementById("settingsOverlay");
    if (overlay) overlay.addEventListener("click", (e) => { if (e.target === overlay) { state.showSettings = false; render(); } });

    // Save settings
    const settingsSave = document.getElementById("settingsSave");
    if (settingsSave) {
      settingsSave.addEventListener("click", async () => {
        const token = document.getElementById("inputToken").value.trim();
        const user  = document.getElementById("inputUser").value.trim();
        const repo  = document.getElementById("inputRepo").value.trim();
        if (!token || !user || !repo) { state.settingsError = "All fields are required."; render(); return; }
        settingsSave.disabled = true;
        settingsSave.textContent = "Testing...";
        const err = await testAndSaveConfig(token, user, repo);
        if (err) { state.settingsError = err; render(); }
      });
    }

    // Filters
    app.querySelectorAll("[data-filter]").forEach(btn => {
      btn.addEventListener("click", () => {
        const f = btn.dataset.filter;
        update({ filter: state.filter === f && f !== "all" ? "all" : f });
      });
    });

    // Sort
    app.querySelectorAll("[data-sort]").forEach(btn => {
      btn.addEventListener("click", () => update({ sortBy: btn.dataset.sort }));
    });

    // Add / Reset
    const addBtn = document.getElementById("addBtn");
    if (addBtn) addBtn.addEventListener("click", addAccount);
    const resetBtn = document.getElementById("resetBtn");
    if (resetBtn) resetBtn.addEventListener("click", resetBoard);

    // Edit name
    app.querySelectorAll("[data-edit-name]").forEach(el => {
      el.addEventListener("click", () => {
        state.editingId = el.dataset.editName;
        render();
        const input = app.querySelector(`[data-name-input="${el.dataset.editName}"]`);
        if (input) { input.focus(); input.select(); }
      });
    });

    // Name input commit
    app.querySelectorAll("[data-name-input]").forEach(input => {
      const id = input.dataset.nameInput;
      input.addEventListener("blur", () => setName(id, input.value));
      input.addEventListener("keydown", e => { if (e.key === "Enter") input.blur(); });
    });

    // Signal lights
    app.querySelectorAll("[data-light]").forEach(btn => {
      btn.addEventListener("click", () => {
        const [id, statusId] = btn.dataset.light.split(":");
        setStatus(id, statusId);
      });
    });

    // Next step
    app.querySelectorAll("[data-nextstep]").forEach(input => {
      input.addEventListener("blur", () => setNextStep(input.dataset.nextstep, input.value));
      input.addEventListener("keydown", e => { if (e.key === "Enter") input.blur(); });
    });

    // Delete
    app.querySelectorAll("[data-delete]").forEach(btn => {
      btn.addEventListener("click", () => deleteAccount(btn.dataset.delete));
    });

    // Auto-focus name input if editing
    if (state.editingId) {
      const input = app.querySelector(`[data-name-input="${state.editingId}"]`);
      if (input) { input.focus(); input.select(); }
    }
  }

  // ── Boot ──
  render();
  initialLoad();
</script>
</body>
</html>
